# example-agent-runner.toml — copy to your project root and edit.

[agent]
command = ["claude", "--model", "claude-opus-4-7",
           "--dangerously-skip-permissions",
           "--verbose", "--output-format", "stream-json"]
prompt_arg_template = ["-p", "{prompt}"]

[runtime]
work_dir = "."
log_dir = "~/.agent-runner/{project}/logs"
round_timeout_s = 1800
restart_delay_s = 3

[prompt]
file = "./prompts/main.md"
inject_context = true

# [phases]                # optional — uncomment to enable phase rotation
# list = ["diverge", "converge", "refine"]

[vcs]
orphan_action = "stash"
stash_idempotency_s = 5
