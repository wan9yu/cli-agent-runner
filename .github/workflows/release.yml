name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Trusted Publishing: the `environment` name below MUST match the
# `Environment name` field in the PyPI pending publisher config.
# A mismatch fails publish with an opaque OIDC error.
# Note: TestPyPI stage intentionally omitted — first release verification
# happens via the manual approval gate on the `pypi` environment.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install build
        run: pip install build
      - name: build sdist + wheel
        run: python -m build
      - name: list dist artifacts
        run: ls -la dist/
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/cli-agent-runner/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: extract CHANGELOG section for this tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section for v$VERSION — using auto-generated notes." > release-notes.md
          fi
          echo "--- release-notes.md preview ---"
          cat release-notes.md
      - name: create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release-notes.md \
            dist/*
