# agent-runner.toml — generated by `agent-runner init --preset kimi`.
#
# Prereqs:
#   - Kimi Code CLI installed (binary `kimi` on PATH):
#       brew install kimi-code            (or: npm i -g @moonshot-ai/kimi-code,
#       or the install script at https://code.kimi.com)
#   - Model access on the supervisor host, via EITHER:
#       - KIMI_API_KEY set in the environment (Moonshot AI Open Platform key), or
#       - a one-time `kimi login` on the host (device-code OAuth; credentials
#         cache at ~/.kimi-code/credentials/).
#     The supervisor runs unattended, so it cannot do the interactive login
#     itself — authenticate once up front. `kimi doctor` validates config.
#   - work_dir is a git repo.
#
# The model is whatever `~/.kimi-code/config.toml` sets as default_model; pin a
# specific one by adding e.g. "-m", "kimi-k3[1m]" to the command below.
#
# The prompt is passed on argv (`kimi -p` has no stdin path). If your prompt can
# contain a token the agent later `pkill -f`s, prefer the claude preset pointed
# at Kimi's Anthropic endpoint instead — see docs/recipes/kimi.md.

[agent]
command = ["kimi", "--yolo", "--output-format", "stream-json"]
prompt_arg_template = ["-p", "{prompt}"]
name = "kimi"

[agent.env]
KIMI_CODE_NO_AUTO_UPDATE = "1"
KIMI_DISABLE_TELEMETRY = "1"

[runtime]
work_dir = "."
log_dir = "~/.agent-runner/{project}/logs"
round_timeout_s = 1800
restart_delay_s = 3

[prompt]
file = "./prompts/main.md"
inject_context = true

[vcs]
dirty_action = "stash"
stash_idempotency_s = 5

[monitor]
auth_fail_hint = "Set KIMI_API_KEY on the supervisor host, or run `kimi login` there (creds cache at ~/.kimi-code/credentials/); `kimi doctor` validates config."
