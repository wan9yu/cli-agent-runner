# agent-runner.toml — generated by `agent-runner init --preset kimi`.
#
# Prereqs:
#   - Kimi Code CLI installed (binary `kimi` on PATH):
#       brew install kimi-code            (or: npm i -g @moonshot-ai/kimi-code,
#       or the install script at https://code.kimi.com)
#   - The supervisor host authenticated AND a default model configured. The
#     cleanest unattended path is a self-contained model spec in the environment
#     (no interactive login, no config.toml) — set KIMI_MODEL_NAME,
#     KIMI_MODEL_API_KEY, KIMI_MODEL_BASE_URL, KIMI_MODEL_PROVIDER_TYPE. See
#     docs/recipes/kimi.md for the exact values (Moonshot = provider type
#     `openai`, base `https://api.moonshot.ai/v1` — China: `api.moonshot.cn/v1`).
#     Alternatively, `kimi login` once on the host (device-code OAuth; creds
#     cache at ~/.kimi-code/credentials/). A raw KIMI_API_KEY alone is NOT enough
#     — `kimi -p` also needs the model configured. `kimi doctor` validates config.
#   - work_dir is a git repo.
#
# `kimi -p` runs one prompt headlessly and auto-approves tool calls by itself; it
# REJECTS --yolo / --auto (`Cannot combine --prompt with --yolo`), so do not add
# them. The model is `~/.kimi-code/config.toml`'s default_model; pin a specific
# one with e.g. "-m", "kimi-k3[1m]" in the command.
#
# The prompt is passed on argv (`kimi -p` has no stdin path). If your prompt can
# contain a token the agent later `pkill -f`s, prefer the claude preset pointed
# at Kimi's Anthropic endpoint instead — see docs/recipes/kimi.md.

[agent]
command = ["kimi", "--output-format", "stream-json"]
prompt_arg_template = ["-p", "{prompt}"]
name = "kimi"

[agent.env]
KIMI_CODE_NO_AUTO_UPDATE = "1"
KIMI_DISABLE_TELEMETRY = "1"

[runtime]
work_dir = "."
log_dir = "~/.agent-runner/{project}/logs"
round_timeout_s = 1800
restart_delay_s = 3

[prompt]
file = "./prompts/main.md"
inject_context = true

[vcs]
dirty_action = "stash"
stash_idempotency_s = 5

[monitor]
auth_fail_hint = "Configure Kimi model access on the supervisor host — set the KIMI_MODEL_* env vars (see docs/recipes/kimi.md) or run `kimi login`; `kimi doctor` validates config."
