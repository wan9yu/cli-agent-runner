# agent-runner.toml — generated by `agent-runner init --preset gemini`.

[agent]
command = ["gemini", "--yolo", "-o", "text"]
prompt_arg_template = ["-p", "{prompt}"]
name = "gemini"

[runtime]
work_dir = "."
log_dir = "~/.agent-runner/{project}/logs"
round_timeout_s = 1800
restart_delay_s = 3

[prompt]
file = "./prompts/main.md"
inject_context = true

[vcs]
dirty_action = "stash"
stash_idempotency_s = 5

[monitor]
auth_fail_hint = "Verify your API key or check your authentication status for Gemini CLI."
